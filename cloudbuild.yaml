steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag'
      - 'us-central1-docker.pkg.dev/spartan-cosmos-502110-d5/dafoor-ai/dafoor-ai:latest'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/spartan-cosmos-502110-d5/dafoor-ai/dafoor-ai:latest'
      - '.'
    id: 'build-image'

  # ── Step 2: Push image to Artifact Registry ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/spartan-cosmos-502110-d5/dafoor-ai/dafoor-ai:latest'
    id: 'push-image'
    waitFor: ['build-image']

  # ── Step 3: Deploy to Cloud Run ──────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'dafoor-ai'
      - '--image'
      - 'us-central1-docker.pkg.dev/spartan-cosmos-502110-d5/dafoor-ai/dafoor-ai:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,FIRESTORE_PROJECT_ID=spartan-cosmos-502110-d5,SESSION_TTL_HOURS=72,GOOGLE_CLIENT_ID=1083217555434-onk7crgt0vh8br844av8ffqrc7t76ecm.apps.googleusercontent.com,SMTP_USER=reyouf14@gmail.com,SMTP_PASSWORD=vsvd babm zhoq suve,APP_BASE_URL=https://dafoor-ai-1083217555434.northamerica-northeast2.run.app'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']

# ── Images produced by this build ─────────────────────────────────────────────
images:
  - 'us-central1-docker.pkg.dev/spartan-cosmos-502110-d5/dafoor-ai/dafoor-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
